<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participant List</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        #participants {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 30px;
            justify-items: center;
        }

        .participant {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .participant:hover {
            transform: scale(1.1);
        }

        .participant img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 2px solid #ffffff;
        }

        .participant-name {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
            padding-top: 60px;
        }

        .modal-content {
            background-color: #2a2a2a;
            margin: 5% auto;
            padding: 30px;
            border: 1px solid #444;
            width: 90%;
            max-width: 400px;
            border-radius: 8px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin: 0;
            color: #ffffff;
        }

        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .close:hover,
        .close:focus {
            color: #ffffff;
        }

        .link-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-button {
            padding: 12px 16px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .link-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .link-button.twitter {
            background-color: #1DA1F2;
            color: white;
        }

        .link-button.twitter:hover:not(:disabled) {
            background-color: #1a91da;
        }

        .link-button.youtube {
            background-color: #FF0000;
            color: white;
        }

        .link-button.youtube:hover:not(:disabled) {
            background-color: #cc0000;
        }

        .link-button.twitch {
            background-color: #9146FF;
            color: white;
        }

        .link-button.twitch:hover:not(:disabled) {
            background-color: #7c3aed;
        }

        .icon {
            font-size: 20px;
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>参加者一覧 - Ark Survival Ascended</h1>
    <div id="participants" class="loading">読み込み中...</div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">参加者情報</h2>
                <button class="close">&times;</button>
            </div>
            <div class="link-buttons" id="link-buttons"></div>
        </div>
    </div>

    <script>
        // YouTube channel ID fetching has been removed.
        async function fetchParticipants() {
            const response = await fetch(
                `https://sheets.googleapis.com/v4/spreadsheets/1ngENWQQQtmKxmCTh-P7K1SBOF8LDcclD51hN16x9C1o/values/Sheet1?key=AIzaSyCiHxdEjo8drpumKBXnorkvXYUJYWkQ8ig`
            );
            const data = await response.json();
            const participants = data.values.slice(1);
            displayParticipants(participants);
        }

        function displayParticipants(participants) {
            const participantDiv = document.getElementById('participants');
            participantDiv.innerHTML = '';
            for (const participant of participants) {
                const participantCard = document.createElement('div');
                participantCard.classList.add('participant');
                const name = participant[2] || '名前なし';
                const imageUrl = 'https://via.placeholder.com/80?text=' + encodeURIComponent(name.substring(0, 2));
                participantCard.innerHTML = `
                    <img src="${imageUrl}" alt="${name}">
                    <div class="participant-name">${name}</div>
                `;
                participantDiv.appendChild(participantCard);
            }
        }

        function closeModal() {
            document.getElementById('myModal').style.display = "none";
        }

        document.querySelector('.close').onclick = closeModal;
        window.onclick = function(event) {
            const modal = document.getElementById('myModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        fetchParticipants();
    </script>
</body>
</html>
