<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participant List</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .participant {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .participant img {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
            padding-top: 60px;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Participant List</h1>
    <div id="participants"></div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="modal-text"></p>
        </div>
    </div>

    <script>
        const apiKey = 'AIzaSyCiHxdEjo8drpumKBXnorkvXYUJYWkQ8ig';
        const spreadsheetId = '1ngENWQQQtmKxmCTh-P7K1SBOF8LDcclD51hN16x9C1o';

        async function fetchParticipants() {
            const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet1?key=${apiKey}`);
            const data = await response.json();
            const participants = data.values.slice(1);
            displayParticipants(participants);
        }

        function displayParticipants(participants) {
            const participantDiv = document.getElementById('participants');
            participants.forEach((participant) => {
                const participantRow = document.createElement('div');
                participantRow.classList.add('participant');
                participantRow.innerHTML = `<img src='${participant[1]}' alt='${participant[0]}'> <span>${participant[0]}</span>`;
                participantRow.onclick = () => showModal(participant[6]); // Column G
                participantDiv.appendChild(participantRow);
            });
        }

        function showModal(link) {
            const modal = document.getElementById('myModal');
            const modalText = document.getElementById('modal-text');
            modalText.innerText = link;
            modal.style.display = "block";

            const span = document.getElementsByClassName("close")[0];
            span.onclick = function() {
                modal.style.display = "none";
            }
            window.onclick = function(event) {
                if (event.target == modal) {
                    modal.style.display = "none";
                }
            }
        }

        fetchParticipants();
    </script>
</body>
</html>
