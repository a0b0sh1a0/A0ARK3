<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Page</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Member Page</h1>
        <div class="social-links">
            <a href="https://www.example.com/x-link" target="_blank">X</a>
            <a href="https://youtube.com/channel/UCXXXXX" target="_blank">YouTube</a>
            <a href="https://twitch.tv/YourChannel" target="_blank">Twitch</a>
        </div>

        <button id="modalBtn">Open Modal</button>

        <div id="myModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Modal Header</h2>
                <p>Some text in the Modal..</p>
            </div>
        </div>

        <div class="placeholder-images">
            <img src="https://via.placeholder.com/150" alt="Placeholder Image 1">
            <img src="https://via.placeholder.com/150" alt="Placeholder Image 2">
        </div>
    </div>

    <script>
        // Modal functionality
        var modal = document.getElementById('myModal');
        var btn = document.getElementById('modalBtn');
        var span = document.getElementsByClassName('close')[0];

        btn.onclick = function() {
            modal.style.display = 'block';
        }

        span.onclick = function() {
            modal.style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
