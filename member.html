<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>参加者一覧</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>参加者一覧</h1>
    <p>カード形式で表示。アイコンをクリックするとX / YouTube / Twitch のリンクを選択できます。</p>
  </header>

  <main id="participants" class="container" aria-label="参加者一覧">
    <!-- カードがここに動的に挿入されます -->
  </main>

  <!-- YouTubeアイコンの共通画像として読み込む（例：YouTube公式アイコンURLを使用） -->
  <svg style="display:none" aria-hidden="true" focusable="false" class="icon-youtube" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <path fill="#ff0000" d="M23.5 7s-.5-3-2.5-3.5C18.6 3 12 3 12 3s-6.6 0-9 .5C1.5 4 1 7 1 7s-.2 3 .8 4.5C3 13 8 13 12 13s9-0 9-0.0c1-.5 2.5-3 2.5-6z"/>
    <polygon fill="#fff" points="9.5 9.5 9.5 15.5 15.5 12"/>
  </svg>

  <script src="script.js"></script>
</body>
</html>
